name: macOS build (極道梟雄 640x480)

# Builds the ENGINE-ONLY 極道梟雄.app on real macOS runners.
#
# IP-clean: this only clones GPLv3 FreeSynd, applies the public CHT patches, and
# bakes in the localization's own fonts + chinese-tw.lng. It deliberately does
# NOT include any EA content (no synd-data / MISS*.DAT, no reconstructed mission
# briefings) — those are injected locally by the owner against their own copy of
# the game. The uploaded artifact is therefore a translation/engine build only.
#
# Two architectures so a "not sure which Mac" owner is covered. Both build on the
# abundant Apple-Silicon runner (free Intel macos-13 runners are deprecated and
# can queue for ~an hour). x86_64 is cross-built via Rosetta + Intel Homebrew, so
# its CMake/link behaviour is byte-for-byte the proven arm64 config — only the
# dependency bottles differ in arch.
#   arm64  (Apple Silicon)       -> macos-14, native
#   x86_64 (Intel + M-via-Rosetta) -> macos-14, cross-compiled
#
# The .app is built unsigned. After data injection it MUST be ad-hoc re-signed on
# a Mac (codesign --force --deep -s -) — adding files invalidates any signature,
# and Apple Silicon refuses to launch an invalid bundle. The delivery zip ships a
# 啟用.command that does exactly that.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/macos.yml'
      - 'patches/**'
      - 'fonts/**'
      - 'data/lang/**'

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            cross: false
          - arch: x86_64
            runner: macos-14
            cross: true

    steps:
      - name: Checkout localization (freesynd-cht)
        uses: actions/checkout@v4
        with:
          path: freesynd-cht

      - name: Checkout FreeSynd engine @ fa27909
        uses: actions/checkout@v4
        with:
          repository: bni/freesynd
          # full 40-char SHA — actions/checkout cannot fetch an abbreviated SHA
          ref: fa27909aa576df22cdb2044eb63f5c2293d57be2
          path: freesynd

      - name: Install host tools (conan, ninja, dylibbundler)
        run: |
          # Host-arch (arm64) tools. dylibbundler rewrites install names with
          # install_name_tool, which is arch-agnostic — it bundles the x86_64
          # dylibs of a cross-build just fine.
          brew install dylibbundler ninja conan || true
          conan profile detect --force
          which dylibbundler cmake ninja conan

      - name: Install SDL for target arch (${{ matrix.arch }})
        run: |
          # SDL is a *system* dep (FindSDL2 + USE_SYSTEM_SDL). The conan libs
          # (libpng/cli11/crcpp/utfcpp) come later via the conan provider, which
          # cross-targets x86_64 from CMAKE_OSX_ARCHITECTURES automatically.
          if [ "${{ matrix.cross }}" = "true" ]; then
            echo "== x86_64 cross: Rosetta + Intel Homebrew (x86_64 SDL bottles) =="
            sudo softwareupdate --install-rosetta --agree-to-license || true
            if [ ! -x /usr/local/bin/brew ]; then
              arch -x86_64 /bin/bash -c \
                'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
            fi
            arch -x86_64 /usr/local/bin/brew install sdl2 sdl2_image sdl2_mixer
            echo "BREW_PREFIX=/usr/local" >> "$GITHUB_ENV"
          else
            brew install sdl2 sdl2_image sdl2_mixer || true
            echo "BREW_PREFIX=$(brew --prefix)" >> "$GITHUB_ENV"
          fi
          echo "SDL prefix for this arch: ${BREW_PREFIX:-pending} (written to GITHUB_ENV)"

      - name: Apply CHT patches + bake in fonts / chinese-tw.lng
        working-directory: freesynd
        run: |
          git apply ../freesynd-cht/patches/00-fix-panic-crash.patch
          git apply ../freesynd-cht/patches/01-freesynd-chinese-tc.patch
          git apply ../freesynd-cht/patches/04-ai-improvements.patch
          git apply ../freesynd-cht/patches/02-hd-640x480-crisp.patch
          # fa27909 ships no data/fonts — the CHT bitmap fonts go here.
          mkdir -p data/fonts data/lang
          cp ../freesynd-cht/fonts/chinese-12.fnt ../freesynd-cht/fonts/chinese-16.fnt data/fonts/
          cp ../freesynd-cht/data/lang/chinese-tw.lng data/lang/
          echo "fonts:" && ls -1 data/fonts/chinese-*.fnt
          echo "lng:"   && ls -1 data/lang/chinese-tw.lng

      - name: Configure (CMake, system SDL via Homebrew, ${{ matrix.arch }})
        working-directory: freesynd
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_SDL=ON \
            -DUSE_SDL_MIXER=ON \
            -DBUILD_TESTING=OFF \
            -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=cmake/conan_provider.cmake \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.4 \
            -DCMAKE_PREFIX_PATH="$BREW_PREFIX"

      - name: Build
        working-directory: freesynd
        run: cmake --build build -j3

      - name: Assemble 極道梟雄.app (rename bundle, strip any stray EA data)
        working-directory: freesynd
        run: |
          APP=$(find build -maxdepth 4 -name '*.app' -type d | head -1)
          test -n "$APP" || { echo "ERROR: no .app produced"; find build -maxdepth 4 -name '*.app'; exit 1; }
          echo "built bundle: $APP"
          STAGE="$RUNNER_TEMP/stage"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/極道梟雄.app"
          # Safety net: the artifact must be engine-only. Remove any original-game
          # data folder if the build happened to create one.
          rm -rf "$STAGE/極道梟雄.app/Contents/Resources/data" || true
          echo "=== bundle layout ==="
          find "$STAGE/極道梟雄.app" -maxdepth 3 -print | sed "s#$STAGE/##"
          # tar (not zip) to preserve the +x bit on the executable and any
          # framework symlinks across the Linux download hop.
          tar -C "$STAGE" -czf "$RUNNER_TEMP/極道梟雄-640x480-mac-${{ matrix.arch }}.tar.gz" 極道梟雄.app
          ls -la "$RUNNER_TEMP/極道梟雄-640x480-mac-${{ matrix.arch }}.tar.gz"

      - name: Upload engine-only app
        uses: actions/upload-artifact@v4
        with:
          name: 極道梟雄-640x480-mac-${{ matrix.arch }}
          path: ${{ runner.temp }}/極道梟雄-640x480-mac-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
